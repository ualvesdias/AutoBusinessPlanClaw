project:
  name: "whatsapp-scheduling-assistant"
  mode: "full-auto"

business:
  idea: "Plataforma web com assistente virtual via WhatsApp para profissionais liberais que trabalham com agendamento e precisam automatizar marcações, remarcações, cancelamentos e comunicação operacional com clientes."
  region: "Brasil"
  currency: "BRL"
  business_model_hint: "B2B SaaS para solo professionals"

runtime:
  timezone: "America/Sao_Paulo"
  max_web_results: 6
  allow_web_research: true
  critique_rounds: 2
  pro_agent_count: 9

llm:
  provider: "auto"
  base_url: "https://api.openai.com/v1"
  api_key_env: "OPENAI_API_KEY"
  model: "gpt-4o-mini"
  temperature: 0.2
  timeout_seconds: 45
  openclaw_base_url: "http://127.0.0.1:18789/v1"
  openclaw_api_key_env: "OPENCLAW_GATEWAY_TOKEN"
  openclaw_model: "openclaw:main"

output:
  root: "artifacts"
