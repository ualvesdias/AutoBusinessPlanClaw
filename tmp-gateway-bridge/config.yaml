project:
  name: gateway-bridge-demo
business:
  idea: "Plataforma web com assistente virtual via WhatsApp para profissionais liberais que trabalham com agendamento."
  region: "Brasil"
  currency: "BRL"
runtime:
  allow_web_research: true
  critique_rounds: 1
  parallel_workers: 2
  max_web_results: 2
llm:
  provider: none
openclaw_bridge:
  enabled: true
  gateway_url: "http://127.0.0.1:18789"
  gateway_token_env: "OPENCLAW_GATEWAY_TOKEN"
  use_gateway_web_search: true
output:
  root: tmp-gateway-bridge/artifacts
